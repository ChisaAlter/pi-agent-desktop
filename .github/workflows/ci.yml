name: CI

on:
  push:
    branches: [master, main, feature/**]
  pull_request:
    branches: [master, main]

jobs:
  quality:
    name: Quality (Typecheck + Lint + Test)
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            ~/AppData/Local/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache electron
        uses: actions/cache@v4
        with:
          path: |
            apps/desktop/.electron-cache
            ~/.cache/electron
            ~/AppData/Local/electron/Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm -r lint

      - name: Test
        run: pnpm -r test

  build:
    name: Build
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            ~/AppData/Local/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache electron
        uses: actions/cache@v4
        with:
          path: |
            apps/desktop/.electron-cache
            ~/.cache/electron
            ~/AppData/Local/electron/Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build renderer
        run: pnpm --filter @pi-desktop/desktop build

      - name: Smoke test main runtime
        run: node scripts/smoke-main-runtime.cjs

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-build-windows
          path: apps/desktop/out/
          retention-days: 7

  e2e:
    name: Critical E2E Tests
    needs: build
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            ~/AppData/Local/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache electron
        uses: actions/cache@v4
        with:
          path: |
            apps/desktop/.electron-cache
            ~/.cache/electron
            ~/AppData/Local/electron/Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for E2E
        run: pnpm --filter @pi-desktop/desktop build

      - name: Run critical Electron E2E tests
        run: pnpm --filter @pi-desktop/desktop exec playwright test e2e/launch.spec.ts e2e/a11y.spec.ts e2e/permission-enforcement.spec.ts e2e/provider-error-real-acceptance.spec.ts e2e/session-resume.spec.ts e2e/updater.spec.ts
        env:
          PI_DESKTOP_E2E_LOCALE: zh-CN
