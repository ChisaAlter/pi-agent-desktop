name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Build + Publish
    runs-on: windows-latest
    timeout-minutes: 30

    permissions:
      contents: write  # 用来创建 GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mount short workspace path
        shell: pwsh
        run: |
          subst P: "$env:GITHUB_WORKSPACE"
          if (-not (Test-Path 'P:\')) {
            throw "Failed to mount short workspace path."
          }
          Write-Host "Using short workspace path P:\ to avoid NSIS MAX_PATH failures."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Install dependencies
        shell: pwsh
        run: |
          Set-Location P:\
          pnpm install --frozen-lockfile

      - name: Test
        shell: pwsh
        run: |
          Set-Location P:\
          pnpm -r test

      - name: Validate Windows signing secrets
        shell: pwsh
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          Set-Location P:\
          if ([string]::IsNullOrWhiteSpace($env:CSC_LINK) -or [string]::IsNullOrWhiteSpace($env:CSC_KEY_PASSWORD)) {
            throw "Missing CSC_LINK or CSC_KEY_PASSWORD. Refusing to publish an auto-update-enabled release without signing secrets."
          }

      - name: Build (renderer + main)
        shell: pwsh
        run: |
          Set-Location P:\
          pnpm --filter @pi-desktop/desktop build
        env:
          PI_DESKTOP_ENABLE_AUTO_UPDATE: "1"

      - name: Restore missing NSIS helper include
        shell: pwsh
        run: |
          Set-Location P:\
          $includeDirs = Get-ChildItem node_modules/.pnpm -Recurse -Directory |
            Where-Object { $_.FullName -like '*app-builder-lib*templates\nsis\include' } |
            Select-Object -ExpandProperty FullName -Unique

          if (-not $includeDirs) {
            throw "Cannot locate app-builder-lib NSIS include directory."
          }

          foreach ($includeDir in $includeDirs) {
            $target = Join-Path $includeDir 'allowOnlyOneInstallerInstance.nsh'
            if (-not (Test-Path $target)) {
              Copy-Item scripts/release/allowOnlyOneInstallerInstance.nsh $target
            }
            if (-not (Test-Path $target)) {
              throw "Failed to restore NSIS helper: $target"
            }
            Write-Host "NSIS helper ready: $target (length=$($target.Length))"
          }

      - name: Package (NSIS installer for Windows)
        shell: pwsh
        run: |
          Set-Location P:\
          pnpm --filter @pi-desktop/desktop package:publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          PI_DESKTOP_ENABLE_AUTO_UPDATE: "1"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pi-desktop-${{ github.ref_name }}-windows
          path: |
            apps/desktop/dist/*.exe
            apps/desktop/dist/*.exe.blockmap
            apps/desktop/dist/latest.yml
          if-no-files-found: error

      - name: Unmount short workspace path
        if: always()
        shell: pwsh
        run: subst P: /d
