name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Build + Publish
    runs-on: windows-latest
    timeout-minutes: 30

    permissions:
      contents: write  # 用来创建 GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm -r test

      - name: Build (renderer + main)
        run: pnpm --filter @pi-desktop/desktop build

      - name: Package (NSIS installer for Windows)
        run: pnpm --filter @pi-desktop/desktop package:publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pi-desktop-${{ github.ref_name }}-windows
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
          if-no-files-found: warn
