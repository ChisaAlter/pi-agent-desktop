name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Build + Publish
    runs-on: windows-latest
    timeout-minutes: 30

    permissions:
      contents: write  # 用来创建 GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mirror repo to short workspace path
        shell: pwsh
        run: |
          $shortWorkspace = 'C:\p'
          if (Test-Path $shortWorkspace) {
            Remove-Item -LiteralPath $shortWorkspace -Recurse -Force
          }
          New-Item -ItemType Directory -Path $shortWorkspace | Out-Null
          robocopy $env:GITHUB_WORKSPACE $shortWorkspace /MIR /XD node_modules .electron-cache apps\desktop\dist apps\desktop\out
          if ($LASTEXITCODE -gt 7) {
            throw "robocopy failed with exit code $LASTEXITCODE"
          }
          $global:LASTEXITCODE = 0
          Write-Host "Using real short workspace path C:\p to avoid NSIS MAX_PATH failures."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Install dependencies
        shell: pwsh
        run: |
          Set-Location C:\p
          pnpm install --frozen-lockfile

      - name: Typecheck
        shell: pwsh
        run: |
          Set-Location C:\p
          pnpm -r typecheck

      - name: Lint
        shell: pwsh
        run: |
          Set-Location C:\p
          pnpm -r lint

      - name: Test
        shell: pwsh
        run: |
          Set-Location C:\p
          pnpm -r test

      - name: Build (renderer + main)
        shell: pwsh
        run: |
          Set-Location C:\p
          pnpm --filter @pi-desktop/desktop build
        env:
          PI_DESKTOP_ENABLE_AUTO_UPDATE: "1"

      - name: Smoke test main runtime
        shell: pwsh
        run: |
          Set-Location C:\p
          node scripts/smoke-main-runtime.cjs

      - name: Restore missing NSIS helper include
        shell: pwsh
        run: |
          Set-Location C:\p
          $includeDirs = Get-ChildItem node_modules/.pnpm -Recurse -Directory |
            Where-Object { $_.FullName -like '*app-builder-lib*templates\nsis\include' } |
            Select-Object -ExpandProperty FullName -Unique

          if (-not $includeDirs) {
            throw "Cannot locate app-builder-lib NSIS include directory."
          }

          foreach ($includeDir in $includeDirs) {
            $target = Join-Path $includeDir 'allowOnlyOneInstallerInstance.nsh'
            if (-not (Test-Path $target)) {
              Copy-Item scripts/release/allowOnlyOneInstallerInstance.nsh $target
            }
            if (-not (Test-Path $target)) {
              throw "Failed to restore NSIS helper: $target"
            }
            Write-Host "NSIS helper ready: $target (length=$($target.Length))"
          }

      - name: Package (NSIS installer for Windows)
        shell: pwsh
        run: |
          Set-Location C:\p
          pnpm --filter @pi-desktop/desktop package
        env:
          PI_DESKTOP_ENABLE_AUTO_UPDATE: "1"

      - name: Verify packaged release artifacts
        shell: pwsh
        run: |
          Set-Location C:\p
          $required = @(
            'apps\desktop\dist\Pi-Desktop-*.exe',
            'apps\desktop\dist\Pi-Desktop-*.exe.blockmap',
            'apps\desktop\dist\latest.yml'
          )

          foreach ($pattern in $required) {
            $matches = Get-ChildItem -Path $pattern -ErrorAction SilentlyContinue
            if (-not $matches) {
              throw "Missing required release artifact for pattern: $pattern"
            }
          }

      - name: Publish GitHub release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Set-Location C:\p
          $tag = $env:GITHUB_REF_NAME
          $notesFile = "RELEASE-NOTES-$tag.md"
          $title = "Pi Desktop $tag"

          if (-not (Test-Path $notesFile)) {
            @(
              "# $title",
              "",
              "Release artifacts for $tag."
            ) | Set-Content -Path $notesFile -Encoding UTF8
          }

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $tag --repo $env:GITHUB_REPOSITORY --title $title --notes-file $notesFile
          } else {
            gh release create $tag --repo $env:GITHUB_REPOSITORY --title $title --notes-file $notesFile
          }

          gh release upload $tag `
            apps/desktop/dist/Pi-Desktop-*.exe `
            apps/desktop/dist/Pi-Desktop-*.exe.blockmap `
            apps/desktop/dist/latest.yml `
            --repo $env:GITHUB_REPOSITORY `
            --clobber

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pi-desktop-${{ github.ref_name }}-windows
          path: |
            C:\p\apps\desktop\dist\*.exe
            C:\p\apps\desktop\dist\*.exe.blockmap
            C:\p\apps\desktop\dist\latest.yml
          if-no-files-found: error

      - name: Remove short workspace path
        if: always()
        shell: pwsh
        run: |
          Remove-Item -LiteralPath C:\p -Recurse -Force -ErrorAction SilentlyContinue
