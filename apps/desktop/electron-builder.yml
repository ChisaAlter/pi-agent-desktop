# Electron Builder Configuration

appId: com.pi-desktop.desktop
productName: Pi Desktop
asar: true
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!build_output.txt'

win:
  executableName: "Pi Desktop"
  icon: build/icon.ico
  target:
    - target: nsis
      arch: x64

nsis:
  artifactName: ${productName}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  createStartMenuShortcut: true
  menuCategory: "Pi Desktop"
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  warningsAsErrors: false

mac:
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false

linux:
  target:
    - AppImage
  maintainer: pi-desktop
  category: Utility

npmRebuild: false

electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
  cache: .electron-cache

electronDist: node_modules/electron/dist

# 自动更新源: GitHub Releases. electron-updater 据此拉取 latest.yml.
# 只有在 release workflow 已验证签名 secrets 并用 PI_DESKTOP_ENABLE_AUTO_UPDATE=1
# 重新构建 main bundle 时, 应用内更新入口才会启用.
publish:
  provider: github
  owner: ChisaAlter
  repo: pi-agent-desktop
  releaseType: release
